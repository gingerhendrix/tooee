name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Version and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # npm trusted publishing requires npm 11.5.1 or newer. Keep the known-good
      # version from the previous release workflow for reproducible OIDC publishes.
      - run: npm install --global npm@11.11.0

      - run: bun install --frozen-lockfile

      - run: bun run build

      # Running every OpenTUI test in one Bun process can crash Bun in CI.
      - run: bun run test:parallel

      - name: Version or publish packages
        run: bun run tegami ci
        env:
          GITHUB_TOKEN: ${{ github.token }}
